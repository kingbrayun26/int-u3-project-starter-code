<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz</title>
    <link rel="stylesheet" href="website.css">
</head>
<body>
    <div class="quiz-container">
        <h1>Web Dev Quiz</h1>
        <div id="quiz">
            <div class="question" id="question-text">Loading question...</div>
            <div class="options-container" id="options-box">
                <!-- Options will be injected here by JavaScript -->
            </div>
        </div>
        <button id="submit-btn">Submit Answer</button>
        <div id="result-container" class="hidden"></div>
    </div>
    
    <script src="website.js"></script>
</body>
</html>

    <!-- The button element with a specific ID -->
    <button id="myButton" class="btn">Go to Next Page</button>

    <script src=".js"></script>
</body>
</html>
